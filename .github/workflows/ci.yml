name: CI
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install CMake
      run: sudo apt update && sudo apt install cmake
    
    - name: Download Google Test
      run: |
        mkdir -p third-party
        cd third-party
        git clone https://github.com/google/googletest.git gtest
        cd ..
    
    - name: Configure
      run: cmake -H. -B_build -DBUILD_TESTS=ON
    
    - name: Build
      run: cmake --build _build
    
    - name: Test
      run: cd _build && ctest --verbose
